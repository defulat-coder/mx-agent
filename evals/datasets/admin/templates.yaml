- meta:
    case_id: ADM-SMOKE-001
    title: 员工查看可用会议室
    layer: agent
    domain: admin
    scenario_type: smoke
    priority: p0
  auth_profile: employee
  input:
    user_input: 看一下现在有哪些可用会议室
  expectation:
    expected_agents:
      - admin-assistant
    expected_agent_mode: all
    expected_tools:
      - adm_get_available_rooms
    expected_tool_mode: all
    forbidden_tools: []
    response_must_include:
      - 会议室
    response_must_not_include: []
    business_assertions: []
