- meta:
    case_id: FIN-SMOKE-001
    title: 员工查看我的报销
    layer: agent
    domain: finance
    scenario_type: smoke
    priority: p0
  auth_profile: employee
  input:
    user_input: 看一下我自己的报销记录
  expectation:
    expected_agents:
      - finance-assistant
    expected_agent_mode: all
    expected_tools:
      - fin_get_my_reimbursements
    expected_tool_mode: all
    forbidden_tools: []
    response_must_include:
      - 报销
    response_must_not_include: []
    business_assertions: []
