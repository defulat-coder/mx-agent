- meta:
    case_id: HR-SMOKE-001
    title: 员工查询个人信息
    layer: agent
    domain: hr
    scenario_type: smoke
    priority: p0
  auth_profile: employee
  input:
    user_input: 帮我看一下我的个人信息
  expectation:
    expected_agents:
      - hr-assistant
    expected_agent_mode: all
    expected_tools:
      - get_employee_info
    expected_tool_mode: all
    forbidden_tools: []
    response_must_include:
      - 个人信息
    response_must_not_include: []
    business_assertions: []
