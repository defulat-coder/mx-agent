- meta:
    case_id: IT-WF-001
    title: IT 管理员先查再处理工单
    layer: agent
    domain: it
    scenario_type: workflow
    priority: p0
  auth_profile: it_admin
  input:
    user_input: 先查待处理工单，再受理最紧急的一单
  expectation:
    expected_agents:
      - it-assistant
    expected_agent_mode: all
    expected_tools:
      - it_admin_get_tickets
      - it_admin_handle_ticket
    expected_tool_mode: ordered
    forbidden_tools: []
    response_must_include:
      - 处理
    response_must_not_include: []
    business_assertions: []
