- meta:
    case_id: IT-SMOKE-001
    title: 员工查看我的工单
    layer: agent
    domain: it
    scenario_type: smoke
    priority: p0
  auth_profile: employee
  input:
    user_input: 看一下我当前的 IT 工单
  expectation:
    expected_agents:
      - it-assistant
    expected_agent_mode: all
    expected_tools:
      - it_get_my_tickets
    expected_tool_mode: all
    forbidden_tools: []
    response_must_include:
      - 工单
    response_must_not_include: []
    business_assertions: []
