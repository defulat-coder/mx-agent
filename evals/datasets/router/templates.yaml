- meta:
    case_id: RTR-SMOKE-001
    title: 工资问题应路由到 HR
    layer: router
    domain: hr
    scenario_type: smoke
    priority: p0
  auth_profile: employee
  input:
    user_input: 我上个月工资多少
  expectation:
    expected_agents:
      - hr-assistant
    expected_agent_mode: all
    expected_tools: []
    expected_tool_mode: none
    forbidden_tools: []
    response_must_include:
      - 工资
    response_must_not_include: []
    business_assertions: []
