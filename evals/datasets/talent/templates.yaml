- meta:
    case_id: TAL-SMOKE-001
    title: 人才发展人员查看员工画像
    layer: agent
    domain: talent
    scenario_type: smoke
    priority: p0
  auth_profile: talent_dev
  input:
    user_input: 看一下员工 1 的人才画像
  expectation:
    expected_agents:
      - hr-assistant
    expected_agent_mode: all
    expected_tools:
      - td_get_employee_profile
    expected_tool_mode: all
    forbidden_tools: []
    response_must_include:
      - 画像
    response_must_not_include: []
    business_assertions: []
